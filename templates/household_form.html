{% extends "base.html" %}
{% block title %}{{ 'Edit' if household else 'New' }} Household - RIA CRM{% endblock %}
{% block content %}
<h4 class="mb-4">{{ 'Edit' if household else 'New' }} Household</h4>
<div class="card p-4" style="max-width: 600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Household Name</label>
            <input type="text" name="name" class="form-control" value="{{ household.name if household else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3">{{ household.notes if household else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ 'Update' if household else 'Create' }}</button>
            <a href="{{ url_for('household_list') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
